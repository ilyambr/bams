<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>random clip player</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main id="stage">
      <video id="clipVideo" autoplay playsinline></video>
      <div id="shade"></div>

      <section id="clipInfo">
        <h1 id="clipTitle"></h1>
        <p id="clipMeta"></p>
      </section>

      <section id="brandBug">
        <img id="ilyambrLogo" src="/assets/ilyambr.png" alt="">
        <img id="bamsLogo" src="/assets/bams.png" alt="">
      </section>

      <div id="status"></div>
    </main>
    <script src="/player.js"></script>
  </body>
</html>
